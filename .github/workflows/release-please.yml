name: "Release Please"

# Manual for now: run this workflow to create/refresh the Release PR, merge
# that PR when you want to release, then run it once more to tag the release
# and publish to PyPI. To make both steps automatic, replace the trigger with:
#
# on:
#   push:
#     branches: [master]
on:
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        id: release

  # The GitHub release above is created with GITHUB_TOKEN, which never
  # triggers other workflows (release.yml included), so publishing happens
  # here instead.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Build
        run: uv build
      - name: Tests (wheel)
        run: uv run --isolated --no-project --with dist/*.whl --with pytest -- pytest tests
      - name: Tests (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz --with pytest -- pytest tests
      - name: Publish
        run: uv publish
