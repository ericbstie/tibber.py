name: Code format checker

on:
  push:
  pull_request:

jobs:
  format-and-lint:
    name: Black formatting
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}
      - name: Install formatting tools
        run: uv sync
      - name: Running black
        run: black --check tibber
      - name: Running flake8
        run: flake8 --per-file-ignores="./tibber/__init__.py:E402"
      - name: Minimize uv cache
        run: uv cache prune --ci
  tests:
    name: Pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"
          - "3.13"
          - "3.14"
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        run: uv python install
      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}
      - name: Install formatting tools
        run: uv sync
      - name: Pytest
        run: python -m pytest tests
      - name: Minimize uv cache
        run: uv cache prune --ci
  coverage:
    name: Pytest
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python
        run: uv python install
      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}
      - name: Install formatting tools
        run: uv sync
      - name: Coverage
        run: uvx pytest --cov=tibber tests/ --cov-report xml:coverage.xml
      - name: Upload to codecov
        run: |
          curl -Os https://uploader.codecov.io/v0.1.0_4653/linux/codecov
          chmod +x codecov
          ./codecov -t ${CODECOV_TOKEN}
      - name: Minimize uv cache
        run: uv cache prune --ci
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"
          - "3.13"
          - "3.14"
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Restore uv cache
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}
      - name: Build
        run: uv build
      - name: Tests (wheel)
        run: uv run --isolated --no-project --with dist/*.whl --with pytest -- pytest tests
      - name: Tests (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz --with pytest -- pytest tests
      - name: Minimize uv cache
        run: uv cache prune --ci